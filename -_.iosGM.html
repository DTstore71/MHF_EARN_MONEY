<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Admin Control</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #030712;
  --card: #0f172a;
  --accent: #38bdf8;
  --accent-glow: rgba(56, 189, 248, 0.3);
  --text-main: #f8fafc;
  --text-dim: #94a3b8;
  --input-bg: #1e293b;
  --grad: linear-gradient(135deg, #0ea5e9, #6366f1);
}

body {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% -20%, #1e293b, #030712);
  font-family: 'Segoe UI', Roboto, sans-serif;
  color: var(--text-main);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 440px;
  background: var(--card);
  padding: 30px;
  border-radius: 28px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
  backdrop-filter: blur(10px);
}

.header {
  text-align: center;
  margin-bottom: 25px;
}

.header i {
  font-size: 40px;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

h2 {
  font-size: 22px;
  letter-spacing: 1px;
  margin: 10px 0;
  text-transform: uppercase;
}

.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.input-group {
  position: relative;
  margin-bottom: 12px;
}

.input-group i {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 14px;
}

input {
  width: 100%;
  padding: 14px 14px 14px 45px;
  background: var(--input-bg);
  border: 1px solid transparent;
  border-radius: 16px;
  color: #fff;
  font-size: 14px;
  transition: all 0.3s;
  box-sizing: border-box;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
  background: #1e293b;
}

.grid-switches {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 15px 0;
}

.switch-card {
  background: rgba(255,255,255,0.03);
  padding: 12px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.2s;
}

.switch-card:hover {
  background: rgba(255,255,255,0.07);
}

.switch-card span {
  font-size: 13px;
  color: var(--text-dim);
}

.btn-primary {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 16px;
  background: var(--grad);
  color: white;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 10px;
}

.btn-primary:active {
  transform: scale(0.98);
}

.timer-box {
  margin-top: 20px;
  padding: 15px;
  background: linear-gradient(to bottom, rgba(56,189,248,0.1), transparent);
  border-radius: 20px;
  text-align: center;
  border: 1px dashed rgba(56, 189, 248, 0.3);
}

#currentVal {
  font-family: 'Courier New', monospace;
  font-size: 20px;
  font-weight: bold;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent-glow);
}

#status {
  text-align: center;
  font-size: 12px;
  margin-top: 15px;
  height: 15px;
  color: #10b981;
}

input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  padding: 0;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <i class="fa-solid fa-bolt-lightning"></i>
    <h2>Master Control</h2>
  </div>

  <div class="section-label"><i class="fa-solid fa-envelope"></i> Message Broadcast</div>
  <div class="input-group">
    <i class="fa-solid fa-at"></i>
    <input type="text" id="adminMessageInput" placeholder="Primary Message">
  </div>
  <div class="input-group">
    <i class="fa-solid fa-pen-nib"></i>
    <input type="text" id="adminMessageNInput" placeholder="Secondary Message">
  </div>
  <div class="input-group">
    <i class="fa-solid fa-comment-dots"></i>
    <input type="text" id="adminMessageIInput" placeholder="Internal Message">
  </div>
  <div class="input-group">
    <i class="fa-solid fa-font"></i>
    <input type="text" id="adminMessageFInput" placeholder="F-Protocol Message">
  </div>

  <button class="btn-primary" id="saveMessageBtn">
    <i class="fa-solid fa-cloud-arrow-up"></i> Update Database
  </button>

  <div class="section-label"><i class="fa-solid fa-toggle-on"></i> Kill Switches</div>
  <div class="grid-switches">
    <label class="switch-card">
      <span>Main System</span>
      <input type="checkbox" id="featureToggle">
    </label>
    <label class="switch-card">
      <span>Switch F</span>
      <input type="checkbox" id="killSwitchFToggle">
    </label>
    <label class="switch-card">
      <span>Switch N</span>
      <input type="checkbox" id="killSwitchNToggle">
    </label>
    <label class="switch-card">
      <span>Switch V</span>
      <input type="checkbox" id="killSwitchVToggle">
    </label>
  </div>

  <div class="section-label"><i class="fa-solid fa-stopwatch"></i> Countdown Timer</div>
  <div class="input-group">
    <i class="fa-solid fa-clock"></i>
    <input type="number" id="hrs" placeholder="Enter Hours (e.g. 5)">
  </div>

  <div class="timer-box">
    <div id="currentVal">Initializing...</div>
  </div>
  <div class="section-label"><i class="fa-solid fa-stopwatch"></i> Countdown Timer 2</div>
<div class="timer-box">
  <div id="currentVal2">Initializing...</div>
  
</div>


<div class="section-label"><i class="fa-solid fa-stopwatch"></i> Countdown Timer 3</div>
<div class="timer-box">
  <div id="currentVal3">Initializing...</div>
</div>
  <button class="btn-primary" style="background: #1e293b; border: 1px solid #334155;" onclick="startCountdown()">
    <i class="fa-solid fa-play"></i> Sync Timer
  </button>
  
<button class="btn-primary" onclick="startCountdown2()">Start Countdown 2</button>
<button class="btn-primary" onclick="startCountdown3()">Start Countdown 3</button>
  <div id="status"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB77ruQ-FxUvMAYHsUOipYB4lAQKaavCN0",
  authDomain: "ludooclubofficial.firebaseapp.com",
  databaseURL: "https://ludooclubofficial-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ludooclubofficial",
  storageBucket: "ludooclubofficial.firebasestorage.app",
  messagingSenderId: "141984102700",
  appId: "1:141984102700:web:37f719e81ae32df69ed489",
  measurementId: "G-PHTVR2KP9E"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const adminInput = document.getElementById("adminMessageInput");
const adminInputN = document.getElementById("adminMessageNInput");
const adminInputI = document.getElementById("adminMessageIInput");
const adminInputF = document.getElementById("adminMessageFInput");
const saveBtn = document.getElementById("saveMessageBtn");
const featureToggle = document.getElementById("featureToggle");
const killSwitchF = document.getElementById("killSwitchFToggle");
const killSwitchN = document.getElementById("killSwitchNToggle");
const killSwitchV = document.getElementById("killSwitchVToggle");
const statusDiv = document.getElementById("status");
const currentDiv = document.getElementById("currentVal");

const notify = (msg) => {
  statusDiv.textContent = msg;
  setTimeout(() => statusDiv.textContent = "", 3000);
};

db.ref("adminMessage").once("value").then(s => adminInput.value = s.val()?.text || "");
db.ref("adminMessageN").once("value").then(s => adminInputN.value = s.val()?.text || "");
db.ref("adminMessageI").once("value").then(s => adminInputI.value = s.val()?.text || "");
db.ref("adminMessageF").once("value").then(s => adminInputF.value = s.val()?.text || "");
db.ref("killSwitchV").once("value").then(s => killSwitchV.checked = s.val()?.active ?? false);
db.ref("settings/featureEnabled").once("value").then(s => featureToggle.checked = s.val() ?? true);
db.ref("killSwitchF").once("value").then(s => killSwitchF.checked = s.val()?.active ?? false);
db.ref("killSwitchN").once("value").then(s => killSwitchN.checked = s.val()?.active ?? false);

db.ref("settings/countdown").on("value", s => {
  const d = s.val();
  if(!d) { currentDiv.textContent = "No active timer"; return; }
  showRemaining(d.start_time, d.duration_hours);
});

saveBtn.onclick = () => {
  const data = {
    adminMessage: {text: adminInput.value.trim()},
    adminMessageN: {text: adminInputN.value.trim()},
    adminMessageI: {text: adminInputI.value.trim()},
    adminMessageF: {text: adminInputF.value.trim()}
  };
  
  Promise.all([
    db.ref("adminMessage").set(data.adminMessage),
    db.ref("adminMessageN").set(data.adminMessageN),
    db.ref("adminMessageI").set(data.adminMessageI),
    db.ref("adminMessageF").set(data.adminMessageF)
  ]).then(() => notify("All messages synced successfully!"));
};

const currentDiv2 = document.getElementById("currentVal2");
const currentDiv3 = document.getElementById("currentVal3");

let timer2 = null;
let timer3 = null;

function showRemaining2(s, h) {
  if(timer2) clearInterval(timer2);
  const e = s + h * 3600000;
  timer2 = setInterval(() => {
    const d = e - Date.now();
    if(d <= 0) { clearInterval(timer2); currentDiv2.textContent = "TIMEOUT"; return; }
    const x = Math.floor(d / 1000);
    const hh = String(Math.floor(x / 3600)).padStart(2, "0");
    const mm = String(Math.floor(x % 3600 / 60)).padStart(2, "0");
    const ss = String(x % 60).padStart(2, "0");
    currentDiv2.textContent = `${hh}:${mm}:${ss}`;
  }, 1000);
}

function showRemaining3(s, h) {
  if(timer3) clearInterval(timer3);
  const e = s + h * 3600000;
  timer3 = setInterval(() => {
    const d = e - Date.now();
    if(d <= 0) { clearInterval(timer3); currentDiv3.textContent = "TIMEOUT"; return; }
    const x = Math.floor(d / 1000);
    const hh = String(Math.floor(x / 3600)).padStart(2, "0");
    const mm = String(Math.floor(x % 3600 / 60)).padStart(2, "0");
    const ss = String(x % 60).padStart(2, "0");
    currentDiv3.textContent = `${hh}:${mm}:${ss}`;
  }, 1000);
}

db.ref("settings/countdown2").on("value", s => {
  const d = s.val();
  if(!d) { currentDiv2.textContent = "No active timer"; return; }
  showRemaining2(d.start_time, d.duration_hours);
});

db.ref("settings/countdown3").on("value", s => {
  const d = s.val();
  if(!d) { currentDiv3.textContent = "No active timer"; return; }
  showRemaining3(d.start_time, d.duration_hours);
});

function startCountdown2() {
  const h = parseFloat(prompt("Enter hours for Countdown 2"));
  if(!h || h <= 0) return alert("Invalid hours");
  db.ref("settings/countdown2").set({start_time: Date.now(), duration_hours: h});
}

function startCountdown3() {
  const h = parseFloat(prompt("Enter hours for Countdown 3"));
  if(!h || h <= 0) return alert("Invalid hours");
  db.ref("settings/countdown3").set({start_time: Date.now(), duration_hours: h});
}

featureToggle.onchange = () => db.ref("settings/featureEnabled").set(featureToggle.checked).then(() => notify("Main system updated"));
killSwitchF.onchange = () => db.ref("killSwitchF").set({active: killSwitchF.checked}).then(() => notify("Switch F updated"));
killSwitchN.onchange = () => db.ref("killSwitchN").set({active: killSwitchN.checked}).then(() => notify("Switch N updated"));
killSwitchV.onchange = () => db.ref("killSwitchV").set({active: killSwitchV.checked}).then(() => notify("Switch V updated"));

let timer = null;
function showRemaining(s, h) {
  if(timer) clearInterval(timer);
  const e = s + h * 3600000;
  timer = setInterval(() => {
    const d = e - Date.now();
    if(d <= 0) { clearInterval(timer); currentDiv.textContent = "TIMEOUT"; return; }
    const x = Math.floor(d / 1000);
    const hh = String(Math.floor(x / 3600)).padStart(2, "0");
    const mm = String(Math.floor(x % 3600 / 60)).padStart(2, "0");
    const ss = String(x % 60).padStart(2, "0");
    currentDiv.textContent = `${hh}:${mm}:${ss}`;
  }, 1000);
}

function startCountdown() {
  const h = parseFloat(document.getElementById("hrs").value);
  if(!h || h <= 0) return alert("Please enter valid hours");
  db.ref("settings/countdown").set({start_time: Date.now(), duration_hours: h});
}

document.addEventListener("click", () => {
  const s = new Audio("./click.mp3");
  s.play().catch(() => {});
});
</script>
</body>
</html>
