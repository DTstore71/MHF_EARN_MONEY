<script>

      apiKey: "AIzaSyB77ruQ-FxUvMAYHsUOipYB4lAQKaavCN0",

};    
    
firebase.initializeApp(firebaseConfig);    
    
const auth = firebase.auth();    
const db = firebase.database();    
    
let currentUserId = null;    
let currentSector = "";    
    
const sectorSelect = document.getElementById("sectorSelect");    
const tableBody = document.getElementById("tableBody");    
const rowCount = document.getElementById("rowCount");    
const greenCount = document.getElementById("greenCount");    
const redCount = document.getElementById("redCount");    
const inboxBtn = document.getElementById("inboxBtn");  
const inboxModal = document.getElementById("inboxModal");  
const closeInboxModal = document.getElementById("closeInboxModal");  
  
inboxBtn.onclick = () => {  
  inboxModal.style.display = "flex";  
  loadInbox(); // 🔥 open করলে data load  
};  
  
closeInboxModal.onclick = () => {  
  inboxModal.style.display = "none";  
};  
  
// বাইরে click করলে close  
window.onclick = (e) => {  
  if (e.target === inboxModal) {  
    inboxModal.style.display = "none";  
  }  
};  
  
// ১. ইনবক্স ডিলিট ফাংশন (পাথ কারেকশন)  
window.deleteInbox = (id) => {  
  if (!confirm("মেসেজটি ডিলিট করবেন?")) return;  
  // পাথটি আপনার ডেটাবেস স্ট্রাকচার অনুযায়ী আপডেট করা হয়েছে  
  db.ref(`users/${currentUserId}/inboxFB/${id}`).remove()  
    .then(() => {  
      toast("মেসেজ ডিলিট হয়েছে");  
    })  
    .catch(err => {  
      toast("Error: " + err.message);  
    });  
};  
  
// ২. ইনবক্স লোড করার সময় রিয়েল-টাইম লিসেনার  
function loadInbox() {  
  const container = document.getElementById("inboxMessages");  
  if (!currentUserId) {  
    container.innerHTML = "<p>লগইন করা নেই</p>";  
    return;  
  }  
    
  container.innerHTML = "লোড হচ্ছে...";  
    
  db.ref(`users/${currentUserId}/inboxFB`).on("value", snap => {  
    container.innerHTML = "";  
    if (!snap.exists()) {  
      container.innerHTML = "<p>কোনো মেসেজ নেই</p>";  
      return;  
    }  
      
    snap.forEach(msg => {  
      const d = msg.val();  
      const div = document.createElement("div");  
      div.className = "inbox-message";  
      div.innerHTML = `  
        <p>${d.text || "মেসেজ পাওয়া যায়নি"}</p>  
        <button onclick="deleteInbox('${msg.key}')"><i class="fas fa-trash"></i> Delete</button>  
      `;  
      container.appendChild(div);  
    });  
  }, error => {  
    container.innerHTML = "<p>Error: " + error.message + "</p>";  
  });  
}  
  
function checkUnreadMessages() {  
  if (!currentUserId) return;  
  const badge = document.getElementById("inboxBadge");  
  
  // .on ব্যবহার করলে ডাটাবেসে পরিবর্তন হওয়া মাত্রই ব্যাজ আপডেট হবে  
  db.ref(`users/${currentUserId}/inboxFB`).on("value", snap => {  
    let unreadCount = 0;  
      
    if (snap.exists()) {  
      snap.forEach(msg => {  
        const data = msg.val();  
        // যদি isRead ফিল্ডটি false থাকে অথবা ফিল্ডটি না থাকে (নতুন মেসেজ)  
        if (data.isRead === false || data.isRead === undefined) {  
          unreadCount++;  
        }  
      });  
    }  
  
    if (unreadCount > 0) {  
      badge.innerText = unreadCount;  
      badge.style.display = "flex"; // 'block' এর বদলে 'flex' দিলে অ্যালাইনমেন্ট সুন্দর হয়  
    } else {  
      badge.style.display = "none";  
    }  
  });  
}  
  
  
  
  
// ২. ইনবক্স ওপেন করলে সব মেসেজ Read করার ফাংশন  
function markAllAsRead() {
  if (!currentUserId) return;

  const inboxRef = db.ref(`users/${currentUserId}/inboxFB`);

  inboxRef.once("value").then(snap => {
    let updates = {};
    snap.forEach(msg => {
      if (msg.val().isRead === false) {

let toastTimer = null;    
    
function toast(msg){    
  const t = document.getElementById("toast");    
  t.innerText = msg;    
  t.classList.add("show");

    t.classList.remove("show");    
  },2500);    
}

document.getElementById("addSector").onclick = async () => {
  if (!currentUserId) return toast("প্রথমে লগইন করুন!");

  const choice = prompt(
    "সেক্টরের ধরন নির্বাচন করুন:\n1) Hotmail 30 Friend\n2) Hotmail 0 Friend\nলিখুন 1 বা 2"
  );
  if (choice !== '1' && choice !== '2') {
    return toast("❌ সঠিক সংখ্যা লিখুন: 1 বা 2");
  }

  const type = choice === '1' ? '30_Hotmail' : '0_Hotmail';

  const userRef = db.ref(`users/${currentUserId}/fbPro`);
  const snapshot = await userRef.once("value");
  const fbPro = snapshot.val() || {};

  let counter = 1;
  const existingNames = Object.values(fbPro).map(p => p.name);
  let sectorName;
  do {
    sectorName = `${type}-${counter.toString().padStart(2,'0')}`;
    counter++;
  } while (existingNames.includes(sectorName));

  // ✅ নতুন সেক্টর শুধু draft থাকবে
  const newRef = userRef.push({
    name: sectorName,
    state: "draft",  // এখানে draft ঠিক আছে
    time: Date.now()
  });

  currentSector = newRef.key;
  sectorSelect.value = currentSector;

  loadSectors();
  loadRows();

  toast(`নতুন সেক্টর তৈরি হয়েছে: ${sectorName}`);
};

function loadRows() {

</td>

window.saveRow = (id, field, val) => {

  saveTimer[id] = setTimeout(() => {
    const rowRef = db.ref(`users/${currentUserId}/fbPro/${currentSector}/entries/${id}`);
    rowRef.once("value").then(snap => {
      const data = snap.val();

      // Safe update
      rowRef.update({ [field]: val.trim() })
        .then(() => console.log("Row updated safely"))
        .catch(err => toast("Update error: " + err.message));

};

function exportToExcel() {
  if (!currentSector) {
    toast("প্রথমে সেক্টর নির্বাচন করুন");
    return;
  }

  db.ref(`users/${currentUserId}/fbPro/${currentSector}`).once('value').then(sectorSnap => {

    if (!sectorData) return toast("সেক্টর ডাটা পাওয়া যায়নি");

    const ref = db.ref(`users/${currentUserId}/fbPro/${currentSector}/entries`);
    ref.once('value').then(snapshot => {
      const data = snapshot.val();
      if (!data) return toast("ডাউনলোড করার মতো ডাটা নেই");

      // Hotmail-ready header (৪ কলাম)
      const headers = ["Uid", "Pass", "2FA", "Hotmail"];

      // Excel row: Hotmail ফিল্ড হবে খালি যদি না থাকে
      const rows = Object.values(data).map(d => [
        d.uid || "",
        d.password || "",
        d.twoFA || "",
        d.hotmail || ""   // Hotmail field
      ]);

      const worksheetData = [headers, ...rows];
      const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);
      worksheet['!cols'] = headers.map(() => ({ wch: 25 }));

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, currentSector);
      XLSX.writeFile(workbook, `${currentSector}.xlsx`);
      toast("✅ Excel ডাউনলোড সফল");
    }).catch(err => {
      toast("Export error: " + err.message);
    });
  }).catch(err => toast("Sector read error: " + err.message));
}

function uploadExcelFile(file) {
  if (!checkFeature()) return;
  if (!currentUserId) return showToast('প্রথমে লগইন করুন!');

  const reader = new FileReader();
  reader.onload = function (e) {
    const data = e.target.result;
    const workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    if (!jsonData || jsonData.length === 0) return showToast('Excel ফাইল খালি!');

    // Header detect
    const firstRow = jsonData[0].map(h => (h || '').toString().trim().toLowerCase());

    const isHeader = firstRow.includes('uid') ||
                     firstRow.includes('email') ||
                     firstRow.includes('password');

    let headersFromExcel = [];
    let dataRows = [];

    if (isHeader) {
      headersFromExcel = jsonData[0].map(h => (h || '').toString().trim());
      dataRows = jsonData.slice(1);
    } else {
      headersFromExcel = ['UID', 'Password', '2FA', 'Hotmail'];
      dataRows = jsonData;
    }

    // Sector check
    db.ref(`users/${currentUserId}/fbPro/${currentSector}`).once('value').then(sectorSnap => {
      const sectorData = sectorSnap.val();
      if (!sectorData) return showToast('সেক্টর ডাটা পাওয়া যায়নি');

      const isCookieSector = sectorData.name.includes("Cookies");

      const rowsFromExcel = dataRows
        .filter(r => r.some(cell => cell !== undefined && cell.toString().trim() !== ""))
        .map(r => ({
          uid: (r[0] || '').toString().trim(),
          password: (r[1] || '').toString().trim(),
          twoFA: (r[2] || '').toString().trim(),
          hotmail: (r[3] || '').toString().trim(),
          state: 'draft',
          time: Date.now()
        }))
        .filter(r => {
          if (!r.uid || !r.password) return false;
          if (!r.twoFA) return false;
          if (!r.hotmail) return false;
          return true;
        });

      if (rowsFromExcel.length === 0) return showToast('Excel-এ কোন ভ্যালিড row নেই!');

      const ref = db.ref(`users/${currentUserId}/fbPro/${currentSector}/entries`);

      ref.once('value').then(snapshot => {
        const existingData = snapshot.val() || {};
        const existinguids = new Set(
          Object.values(existingData).map(d => d.uid)
        );

        let newRowsCount = 0;

        rowsFromExcel.forEach(r => {
          if (!existinguids.has(r.uid)) {
            const id = ref.push().key;
            ref.child(id).set(r).catch(err => showToast("Upload error: " + err.message));
            newRowsCount++;
          }
        });

        if (newRowsCount > 0) {
          showToast(`✅ ${newRowsCount} টি নতুন row আপলোড হয়েছে`);
        } else {
          showToast('Excel-এ নতুন কোন row পাওয়া যায়নি');
        }

        setTimeout(() => loadRows(), 500);
      }).catch(err => showToast("Firebase read error: " + err.message));
    }).catch(err => showToast("Sector read error: " + err.message));
  };

  reader.readAsArrayBuffer(file);
}

function loadTable() {    
  if (!currentSector) return;    
  const ref = firebase.database().ref(`users/${currentUserId}/tables/${currentSector}`);    
  ref.once('value').then(snapshot => {    
    const data = snapshot.val();    
    if (!data || !data.rows) {    
      tableBody.innerHTML = '';    
      rowCount.innerText = "সারি: 0";    
      return;    
    }    
    
    const rows = data.rows;    
    tableBody.innerHTML = '';    
    rows.forEach((r, idx) => {    
      const tr = document.createElement('tr');    
      tr.innerHTML = `    
        <td contenteditable oninput="saveExcelRow(${idx},0,this.innerText)">${r[0] || ''}</td>    
        <td contenteditable oninput="saveExcelRow(${idx},1,this.innerText)">${r[1] || ''}</td>    
      `;    
      tableBody.appendChild(tr);    
    });    
    rowCount.innerText = "সারি: " + rows.length;    
  });    
}    
    
// Excel টেবিলে এডিট হলে Firebase আপডেট    
function saveExcelRow(rowIdx, colIdx, val) {
  const ref = db.ref(`users/${currentUserId}/tables/${currentSector}/rows/${rowIdx}`);
  ref.once('value').then(snap => {
    const row = snap.val() || [];
    row[colIdx] = val;
    // Partial update
    ref.set(row).catch(err => toast("Excel save error: " + err.message));
  });
}
